<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial;
            color: white;
            overflow: hidden;
        }
        h1 {
            margin-top: 80px;
            font-size: 40px;
        }
        p {
            font-size: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            margin: 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        #yes {
            background-color: #28a745;
            color: white;
        }
        #no {
            background-color: #dc3545;
            color: white;
            position: absolute;
        }
        .heart {
            position: fixed;
            color: red;
            font-size: 20px;
            animation: fall 5s linear infinite;
        }
        @keyframes fall {
            0% { top: -10px; }
            100% { top: 100vh; }
        }
    </style>
</head>
<body>

    <h1>Hey... 💖</h1>
    <p>You are the most special person in my life 🥺</p>
    <p>From the moment I met you... everything changed ❤️</p>
    <p>I just want to ask you one thing...</p>

    <h2>YOU ARE MY BEST SENIOR EVER? 💍</h2>

    <button id="yes" onclick="yesClick()">Yes ❤️</button>
    <button id="no" onmouseover="moveNo()">No 😢</button>

    <audio autoplay loop>
        <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
    </audio>

    <script>
        function yesClick() {
            document.body.innerHTML = "<h1>THANK YOU SO MUCH ❤️🥰</h1><p>You made me the happiest person 💖</p>";
        }

        function moveNo() {
            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;
            document.getElementById("no").style.left = x + "px";
            document.getElementById("no").style.top = y + "px";
        }

        // hearts falling
        setInterval(() => {
            let heart = document.createElement("div");
            heart.innerHTML = "❤️";
            heart.className = "heart";
            heart.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }, 300);
    </script>

</body>
</html>
